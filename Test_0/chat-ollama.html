<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Ollama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            font-size: 0.85em;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .model-info {
            background: #e3f2fd;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8em;
        }

        .chat-area {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            background: #f0f0f0;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-bubble pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .message-bubble code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .message-time {
            font-size: 0.7em;
            color: #999;
            margin-top: 5px;
            padding-left: 10px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .input-area button:hover:not(:disabled) {
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings {
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.85em;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings input {
            width: 60px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .settings select {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .clear-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦙 Chat con Ollama</h1>
            <p>Modelos de lenguaje locales - 100% privado</p>
        </div>

        <div class="status-bar">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando conexión...</span>
            </div>
            <div class="model-info">
                🧠 Modelo: <select id="modelSelect">
                    <option value="llama3.2">llama3.2</option>
                    <option value="llama3.2:7b">llama3.2:7b</option>
                    <option value="mistral">mistral</option>
                    <option value="phi3">phi3</option>
                    <option value="qwen2.5">qwen2.5</option>
                </select>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-avatar">🦙</div>
                <div class="message-bubble">
                    ¡Hola! Soy Ollama. Puedo ayudarte con lo que necesites.<br>
                    Escribe tu pregunta y te responderé.
                </div>
            </div>
        </div>

        <div class="settings">
            <label>🌡️ Temperatura: <input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2"></label>
            <label>📝 Max tokens: <input type="number" id="maxTokens" value="500" step="100" min="50" max="4000"></label>
            <button class="clear-btn" onclick="clearChat()">🗑️ Limpiar chat</button>
            <span style="font-size:0.75em; color:#999;">🔗 API: <span id="apiUrl">http://localhost:11434</span></span>
        </div>

        <div class="input-area">
            <input type="text" id="promptInput" placeholder="Escribe tu pregunta aquí..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendPrompt()">Enviar ➤</button>
        </div>
    </div>

    <script>
        let ollamaUrl = 'http://localhost:11434';
        
        // Detectar si n8n está en Docker
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            ollamaUrl = 'http://localhost:11434';
        }

        document.getElementById('apiUrl').textContent = ollamaUrl;

        async function checkConnection() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            try {
                const response = await fetch(`${ollamaUrl}/api/tags`, {
                    method: 'GET',
                    timeout: 3000
                });
                
                if (response.ok) {
                    const data = await response.json();
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Conectado a Ollama';
                    
                    // Actualizar select con modelos disponibles
                    if (data.models && data.models.length > 0) {
                        const select = document.getElementById('modelSelect');
                        const currentModels = Array.from(select.options).map(o => o.value);
                        for (const model of data.models) {
                            if (!currentModels.includes(model.name.split(':')[0])) {
                                const option = document.createElement('option');
                                option.value = model.name.split(':')[0];
                                option.textContent = model.name;
                                select.appendChild(option);
                            }
                        }
                    }
                } else {
                    throw new Error('Error en respuesta');
                }
            } catch (error) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '❌ No conectado. ¿Ollama está corriendo?';
                console.error('Conexión fallida:', error);
            }
        }

        async function sendPrompt() {
            const input = document.getElementById('promptInput');
            const prompt = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!prompt) return;
            
            // Agregar mensaje del usuario al chat
            addMessage(prompt, 'user');
            input.value = '';
            sendBtn.disabled = true;
            
            // Mostrar indicador de escritura
            const typingId = showTypingIndicator();
            
            try {
                const model = document.getElementById('modelSelect').value;
                const temperature = parseFloat(document.getElementById('temperature').value);
                const maxTokens = parseInt(document.getElementById('maxTokens').value);
                
                const response = await fetch(`${ollamaUrl}/api/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: model,
                        prompt: prompt,
                        stream: false,
                        options: {
                            temperature: temperature,
                            num_predict: maxTokens
                        }
                    })
                });
                
                removeTypingIndicator(typingId);
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.response, 'assistant');
                } else {
                    const errorText = await response.text();
                    addMessage(`Error: ${response.status} - ${errorText}`, 'assistant');
                }
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage(`Error de conexión: ${error.message}\n\nVerifica que Ollama esté corriendo en ${ollamaUrl}`, 'assistant');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
        
        function addMessage(text, role) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🦙';
            const avatarBg = role === 'user' ? '#667eea' : '#f0f0f0';
            
            // Formatear código si existe
            let formattedText = text;
            if (text.includes('```')) {
                formattedText = formatCodeBlocks(text);
            } else {
                formattedText = text.replace(/\n/g, '<br>');
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar" style="background: ${avatarBg};">${avatar}</div>
                <div>
                    <div class="message-bubble">${formattedText}</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function formatCodeBlocks(text) {
            return text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
            }).replace(/\n/g, '<br>');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🦙</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }
        
        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }
        
        function clearChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🦙</div>
                    <div class="message-bubble">
                        Chat limpiado. ¿En qué puedo ayudarte?
                    </div>
                </div>
            `;
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendPrompt();
            }
        }
        
        // Verificar conexión al cargar y cada 10 segundos
        checkConnection();
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
